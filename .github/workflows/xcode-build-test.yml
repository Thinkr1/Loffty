name: Xcode - Build and Test

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-latest
    timeout-minutes: 25
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.pbxproj', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build & Test
        run: |
          set -o pipefail
          mkdir -p TestResults
          xcodebuild test \
            -project Loffty.xcodeproj \
            -scheme Loffty \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
            -resultBundlePath TestResults/Loffty.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcbeautify --report junit --report-path TestResults

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults/Loffty.xcresult
          if-no-files-found: ignore

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: TestResults/**/*.xml
          if-no-files-found: ignore

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: LofftyTests
          path: TestResults/**/*.xml
          reporter: java-junit
          fail-on-error: false
